{% extends 'base.html' %}
{% block content %}
<h2>Set Up Fee Structure</h2>
<div style="max-width: 600px; background: white; padding: 25px; border-radius: 8px; border: 1px solid #ddd;">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="background: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer;">
            Save Fee Structure
        </button>
    </form>
</div>
{% endblock %}
