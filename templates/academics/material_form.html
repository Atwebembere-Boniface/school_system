{% extends 'base.html' %}

{% block content %}
<div style="max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 8px; border: 1px solid #ddd;">
    <h2>Upload Learning Material</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div style="margin-bottom: 15px;">
            <label>Title:</label><br>
            {{ form.title }}
        </div>
        <div style="margin-bottom: 15px;">
            <label>Material Type (Notes or Assignment):</label><br>
            {{ form.material_type }}
        </div>
        <div style="margin-bottom: 15px;">
            <label>Assign to Class/Subject:</label><br>
            {{ form.assignment }}
            <p style="font-size: 0.8em; color: #666;">Only your assigned classes are listed here.</p>
        </div>
        <div style="margin-bottom: 20px;">
            <label>Select File:</label><br>
            {{ form.file }}
        </div>
        <button type="submit" style="background: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer;">
            Save Material
        </button>
        <a href="{% url 'teacher_dashboard' %}" style="margin-left: 10px; color: #666;">Cancel</a>
    </form>
</div>
{% endblock %}
