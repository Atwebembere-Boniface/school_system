{% extends 'base.html' %}

{% block content %}
<div style="max-width: 600px; margin: 20px auto; padding: 20px; border: 1px solid #dc3545; border-radius: 8px; background: #fff5f5;">
    <h2 style="color: #dc3545;">Warning: Delete Record</h2>
    <p>Are you sure you want to delete <strong>{{ object }}</strong>?</p>
    <p style="font-size: 0.9em; color: #666;">This action cannot be undone. If this is a student, their login account will also be removed.</p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit" style="padding: 10px 20px; background: #dc3545; color: white; border: none; border-radius: 5px; cursor: pointer;">
            Yes, Delete Permanently
        </button>
        <a href="{{ request.META.HTTP_REFERER }}" style="margin-left: 15px; color: #333;">Cancel and Go Back</a>
    </form>
</div>
{% endblock %}
