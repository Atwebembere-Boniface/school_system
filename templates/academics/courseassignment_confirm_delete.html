{% extends 'base.html' %}
{% block content %}
<div style="max-width: 500px; margin: 50px auto; padding: 20px; border: 1px solid #ffccd5; background: #fff5f5; border-radius: 8px; text-align: center;">
    <h2 style="color: #dc3545;">Confirm Deletion</h2>
    <p>Are you sure you want to delete the assignment for <strong>{{ object.teacher.get_full_name }}</strong> teaching <strong>{{ object.subject.name }}</strong>?</p>
    
    <form method="post">
        {% csrf_token %}
        <button type="submit" style="background: #dc3545; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold;">
            Yes, Delete Permanently
        </button>
        <a href="{% url 'academics:all_staff_load' %}" style="display: inline-block; margin-left: 10px; text-decoration: none; color: #666; padding: 10px; border: 1px solid #ccc; border-radius: 4px; background: white;">
            Cancel
        </a>
    </form>
</div>
{% endblock %}
